# Dev stack: Postgres+PostGIS, Redis, MinIO.
# Start with:  docker compose up -d
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: stickerboard
      POSTGRES_PASSWORD: stickerboard
      POSTGRES_DB: stickerboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the separate test database on first init.
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickerboard -d stickerboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    # No healthcheck: the minio image ships no curl/wget, so a CMD check
    # would false-fail. Liveness is at http://localhost:9000/minio/health/live.

volumes:
  pgdata:
  miniodata:
